<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0c0c10">
<meta name="mobile-web-app-capable" content="yes">
<title>CMA Tracker — Deepanshu</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0c10;--card:#13131a;--card2:#1a1a24;--border:#222232;--text:#e8e8f0;--muted:#5a5a80;--ca:#3b82f6;--fa:#10b981;--dt:#f59e0b;--idt:#ef4444;--law:#a855f7;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;display:flex;flex-direction:column;height:100dvh;overflow:hidden;user-select:none;}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:12px 14px 10px;flex-shrink:0;}
.topbar-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.app-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;background:linear-gradient(135deg,#3b82f6,#10b981 50%,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.date-chip{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);background:var(--card2);padding:4px 10px;border-radius:20px;border:1px solid var(--border);}
.countdown-strip{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;}
.cd-item{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:7px 8px;text-align:center;}
.cd-num{font-family:'DM Mono',monospace;font-size:18px;font-weight:500;line-height:1.1;}
.cd-label{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px;line-height:1.3;}
.nav-tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;}
.nav-tabs::-webkit-scrollbar{display:none;}
.nav-tab{flex:1;min-width:0;padding:9px 4px;text-align:center;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;white-space:nowrap;}
.nav-tab.active{color:var(--text);border-bottom-color:var(--tc,#3b82f6);}
.tab-dot{width:5px;height:5px;border-radius:50%;margin:0 auto 3px;opacity:0.4;}
.nav-tab.active .tab-dot{opacity:1;}
.main-scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:12px 12px 24px;}
.main-scroll::-webkit-scrollbar{display:none;}
.page{display:none;} .page.active{display:block;}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;}
.bar-track{height:7px;background:var(--border);border-radius:99px;overflow:hidden;margin:8px 0 4px;}
.bar-fill{height:100%;border-radius:99px;transition:width 0.5s cubic-bezier(.4,0,.2,1);}
.overall-fill{background:linear-gradient(90deg,#3b82f6,#10b981 50%,#f59e0b);}
.oc-top{display:flex;align-items:center;justify-content:space-between;}
.oc-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--muted);}
.oc-pct{font-family:'DM Mono',monospace;font-size:26px;font-weight:500;}
.oc-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);}
.subj-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.subj-mini{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;transition:transform 0.1s;}
.subj-mini:active{transform:scale(0.97);}
.sm-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.sm-name{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.3px;line-height:1.3;}
.sm-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);}
.sm-paper{font-size:9px;color:var(--muted);margin-top:4px;}
.today-task{display:flex;align-items:flex-start;gap:9px;padding:9px 0;border-bottom:1px solid var(--border);}
.today-task:last-child{border-bottom:none;}
.tt-tag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;text-transform:uppercase;flex-shrink:0;margin-top:2px;}
.tt-text{font-size:12px;color:#c0c0d8;line-height:1.5;flex:1;}
.split-line{height:1px;background:rgba(255,255,255,0.05);margin:4px 0;}
.law-card{background:rgba(168,85,247,0.06);border:1px solid rgba(168,85,247,0.2);border-radius:12px;padding:14px;margin-bottom:10px;}
.law-badge{font-size:9px;font-weight:700;padding:2px 8px;border-radius:4px;background:rgba(168,85,247,0.15);color:#a855f7;text-transform:uppercase;letter-spacing:1px;display:inline-block;margin-bottom:6px;}
.law-text{font-size:12px;color:#b090d0;line-height:1.6;}
.subj-header{display:flex;align-items:center;gap:8px;padding:10px 0 6px;}
.subj-header h3{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;}
.paper-badge{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);background:var(--card2);padding:2px 7px;border-radius:4px;border:1px solid var(--border);}
.prog-row{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;}
.section-div{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--muted);padding:10px 0 4px;}
.ch-item{display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 13px;margin-bottom:6px;cursor:pointer;transition:transform 0.1s,background 0.15s;}
.ch-item:active{transform:scale(0.98);}
.ch-item.done{background:rgba(16,185,129,0.05);border-color:rgba(16,185,129,0.18);}
.chk{width:21px;height:21px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;}
.ch-item.done .chk{border-color:var(--sc,#10b981);background:var(--sc,#10b981);}
.chk svg{display:none;width:12px;height:12px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
.ch-item.done .chk svg{display:block;}
.ch-label{flex:1;font-size:12px;line-height:1.4;color:var(--text);transition:color 0.2s;}
.ch-item.done .ch-label{color:var(--muted);text-decoration:line-through;text-decoration-color:rgba(255,255,255,0.1);}
.ch-wt{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);flex-shrink:0;}
.warn-tag{font-size:8px;font-weight:700;padding:2px 5px;border-radius:3px;background:rgba(239,68,68,0.12);color:#ef4444;text-transform:uppercase;flex-shrink:0;}
.phase-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--muted);padding:12px 0 6px;}
.wk-card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;}
.wk-head{padding:10px 13px;border-bottom:1px solid var(--border);}
.wk-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);}
.wk-dates{font-size:12px;font-weight:700;margin:2px 0;}
.wk-focus{font-size:10px;color:var(--muted);}
.law-strip{background:rgba(168,85,247,0.05);border-bottom:1px solid rgba(168,85,247,0.12);padding:8px 13px;font-size:11px;color:#b090d0;line-height:1.5;}
.plan-day{border-bottom:1px solid var(--border);padding:10px 13px;}
.plan-day:last-child{border-bottom:none;}
.plan-day.today-day{background:rgba(59,130,246,0.04);}
.pday-hdr{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;}
.pday-name{font-size:12px;font-weight:700;}
.pday-date{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);}
.pday-time{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-left:auto;}
.today-pill{font-size:8px;font-weight:700;padding:2px 7px;border-radius:20px;background:rgba(59,130,246,0.15);color:#3b82f6;text-transform:uppercase;letter-spacing:1px;}
.ptask{display:flex;align-items:flex-start;gap:7px;font-size:11px;color:#b0b0d0;line-height:1.5;margin-bottom:4px;}
.ptask:last-child{margin-bottom:0;}
.ptag{font-size:8px;font-weight:700;padding:2px 5px;border-radius:3px;text-transform:uppercase;flex-shrink:0;margin-top:2px;}
.psplit{height:1px;background:rgba(255,255,255,0.04);margin:5px 0;}
.t-ca{background:rgba(59,130,246,0.15);color:#3b82f6;} .t-fa{background:rgba(16,185,129,0.15);color:#10b981;} .t-dt{background:rgba(245,158,11,0.15);color:#f59e0b;} .t-idt{background:rgba(239,68,68,0.15);color:#ef4444;} .t-law{background:rgba(168,85,247,0.12);color:#a855f7;} .t-rev{background:rgba(100,116,139,0.15);color:#94a3b8;}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:9px 18px;font-size:12px;color:var(--text);transition:transform 0.3s cubic-bezier(.4,0,.2,1);z-index:999;white-space:nowrap;pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,0.5);}
.toast.show{transform:translateX(-50%) translateY(0);}
*{scrollbar-width:none;} *::-webkit-scrollbar{display:none;}
</style>
</head>

      </div>
      <div id="today-content"></div>

    <div class="law-card">

  <div class="page" id="page-planner"></div>
</div>
<div class="toast" id="toast"></div>

// ── Storage ──────────────────────────────────────────────────────────────────
var progress={};
function loadProgress(){try{var r=localStorage.getItem('cma-deepanshu-v3');if(r)progress=JSON.parse(r);}catch(e){progress={};}}
function saveProgress(){try{localStorage.setItem('cma-deepanshu-v3',JSON.stringify(progress));}catch(e){}}
function setDefaults(){var done=['ca-2','ca-3','ca-4','ca-8','ca-9','dt-1','dt-2','dt-3','dt-4'];for(var i=0;i<done.length;i++){if(progress[done[i]]===undefined)progress[done[i]]=true;}}

// ── Countdown ────────────────────────────────────────────────────────────────
function daysUntil(y,m,d){var t=new Date();var today=new Date(t.getFullYear(),t.getMonth(),t.getDate());var target=new Date(y,m,d);return Math.max(0,Math.ceil((target-today)/86400000));}

function updateDate(){
  var now=new Date();
  document.getElementById('date-chip').textContent=DAYS[now.getDay()]+', '+now.getDate()+' '+MONTHS[now.getMonth()]+' '+now.getFullYear();
  document.getElementById('cd-s').textContent=daysUntil(2026,3,22);
  document.getElementById('cd-r').textContent=daysUntil(2026,4,30);
  document.getElementById('cd-e').textContent=daysUntil(2026,5,11);
  document.getElementById('today-badge').textContent=DAYS[now.getDay()].slice(0,3)+' '+now.getDate()+' '+MONTHS[now.getMonth()];
  // Today tasks
  var d=now.getDay();
  var tasks=DAY_TASKS[d]||[];
  var html='';
  for(var i=0;i<tasks.length;i++){var t=tasks[i];if(!t.tag){html+='<div class="split-line"></div>';continue;}html+='<div class="today-task"><span class="tt-tag t-'+t.tag+'">'+t.tag.toUpperCase()+'</span><span class="tt-text">'+t.text+'</span></div>';}
  document.getElementById('today-content').innerHTML=html;
  // Law target
  var start=new Date(2026,2,25);
  var today2=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  var wk=Math.max(0,Math.floor((today2-start)/(7*86400000)));
  var idx=Math.min(wk,LAW_TARGETS.length-1);
  document.getElementById('law-target').innerHTML='<strong>Week '+(wk+1)+' target:</strong> '+LAW_TARGETS[idx];
}

// ── Counts ───────────────────────────────────────────────────────────────────
function countSubj(subj){var total=0,done=0;for(var s=0;s<subj.sections.length;s++){for(var c=0;c<subj.sections[s].chapters.length;c++){total++;if(progress[subj.sections[s].chapters[c].id])done++;}}return{total:total,done:done};}
function countAll(){var t=0,d=0;for(var i=0;i<SUBJECTS.length;i++){var r=countSubj(SUBJECTS[i]);t+=r.total;d+=r.done;}return{total:t,done:d};}

// ── Update UI ─────────────────────────────────────────────────────────────────
function updateOverall(){var r=countAll();var pct=r.total?Math.round(r.done/r.total*100):0;document.getElementById('ov-pct').textContent=pct+'%';document.getElementById('ov-bar').style.width=pct+'%';document.getElementById('ov-count').textContent=r.done+' / '+r.total+' chapters done';}

function updateSubjCard(id){
  var subj=null;for(var i=0;i<SUBJECTS.length;i++){if(SUBJECTS[i].id===id){subj=SUBJECTS[i];break;}}
  if(!subj)return;
  var r=countSubj(subj);var pct=r.total?Math.round(r.done/r.total*100):0;
  var b=document.getElementById('mb-'+id);if(b)b.style.width=pct+'%';
  var c=document.getElementById('mc-'+id);if(c)c.textContent=r.done+'/'+r.total;
  var p=document.getElementById('mp-'+id);if(p)p.textContent=subj.paper+' · '+pct+'% done';
  var cb=document.getElementById('cb-'+id);if(cb)cb.style.width=pct+'%';
  var cp=document.getElementById('cp-'+id);if(cp)cp.textContent=r.done+' / '+r.total+' done · '+pct+'%';
}

// ── Build subject mini grid ──────────────────────────────────────────────────
function buildMini(){
  var html='';
  for(var i=0;i<SUBJECTS.length;i++){
    var s=SUBJECTS[i];var r=countSubj(s);var pct=r.total?Math.round(r.done/r.total*100):0;
    html+='<div class="subj-mini" onclick="goTab(\''+s.id+'\')">'
      +'<div class="sm-top"><div class="sm-name" style="color:'+s.color+'">'+s.name+'</div><div class="sm-count" id="mc-'+s.id+'">'+r.done+'/'+r.total+'</div></div>'
      +'<div class="bar-track" style="height:5px;margin:4px 0;"><div class="bar-fill" style="width:'+pct+'%;background:'+s.color+'" id="mb-'+s.id+'"></div></div>'
      +'<div class="sm-paper" id="mp-'+s.id+'">'+s.paper+' · '+pct+'% done</div>'
      +'</div>';
  }
  document.getElementById('subj-grid').innerHTML=html;
}

// ── Build chapter pages ───────────────────────────────────────────────────────
function buildChapterPage(subj){
  var r=countSubj(subj);var pct=r.total?Math.round(r.done/r.total*100):0;
  var html='<div class="subj-header"><h3 style="color:'+subj.color+'">'+subj.name+'</h3><div class="paper-badge">'+subj.paper+'</div></div>'
    +'<div class="prog-row" id="cp-'+subj.id+'">'+r.done+' / '+r.total+' done · '+pct+'%</div>'
    +'<div class="bar-track" style="margin-bottom:10px;"><div class="bar-fill" style="width:'+pct+'%;background:'+subj.color+'" id="cb-'+subj.id+'"></div></div>';
  for(var s=0;s<subj.sections.length;s++){
    var sec=subj.sections[s];
    html+='<div class="section-div">'+sec.label+'</div>';
    for(var c=0;c<sec.chapters.length;c++){
      var ch=sec.chapters[c];
      var done=progress[ch.id]?'done':'';
      var wt=ch.warn?'<span class="warn-tag">⚠️IDT</span>':'';
      html+='<div class="ch-item '+done+'" id="ci-'+ch.id+'" style="--sc:'+subj.color+'" onclick="toggleCh(\''+subj.id+'\',\''+ch.id+'\')">'
        +'<div class="chk"><svg viewBox="0 0 13 13"><polyline points="1.5,6.5 5,10 11.5,3"/></svg></div>'
        +'<div class="ch-label">'+ch.text+'</div>'
        +wt+'<div class="ch-wt">'+ch.w+'</div></div>';
    }
  }
  document.getElementById('page-'+subj.id).innerHTML=html;
}

// ── Toggle chapter ────────────────────────────────────────────────────────────
var tTimer;
function toggleCh(subjId,chapId){
  progress[chapId]=!progress[chapId];saveProgress();
  var el=document.getElementById('ci-'+chapId);
  if(el){if(progress[chapId])el.classList.add('done');else el.classList.remove('done');}
  updateSubjCard(subjId);updateOverall();
  var t=document.getElementById('toast');
  t.textContent=progress[chapId]?'✅ Chapter marked done!':'↩️ Chapter unmarked';
  t.classList.add('show');clearTimeout(tTimer);tTimer=setTimeout(function(){t.classList.remove('show');},1800);
}

// ── Build planner ─────────────────────────────────────────────────────────────
function buildPlanner(){
  var now=new Date();
  var nowDay=now.getDate();var nowMonth=now.getMonth();// 0-indexed
  var html='<div class="phase-lbl">Phase 1 — Syllabus Completion (Mar 25 → Apr 22)</div>';
  for(var w=0;w<WEEKS.length;w++){
    var wk=WEEKS[w];
    html+='<div class="wk-card"><div class="wk-head"><div class="wk-num">'+wk.num+'</div><div class="wk-dates">'+wk.dates+'</div><div class="wk-focus">'+wk.focus+'</div></div>'
      +'<div class="law-strip">📖 <strong>Law:</strong> '+wk.law+'</div>';
    for(var d=0;d<wk.days.length;d++){
      var day=wk.days[d];
      // Parse day date e.g. "25 Mar" or "1 Apr"
      var parts=day.d.split(' ');
      var dayNum=parseInt(parts[0]);
      var monthIdx=MONTHS.indexOf(parts[1]);
      var isToday=(dayNum===nowDay && monthIdx===nowMonth);
      html+='<div class="plan-day'+(isToday?' today-day':'')+'"><div class="pday-hdr">'
        +'<span class="pday-name">'+day.n+(isToday?' <span class="today-pill">Today</span>':'')+'</span>'
        +'<span class="pday-date">'+day.d+'</span>'
        +'<span class="pday-time">'+(day.time||'')+'</span></div>';
      for(var t=0;t<day.tasks.length;t++){
        var task=day.tasks[t];
        if(task.tag==='div'){html+='<div class="psplit"></div>';continue;}
        var lbl=task.tag==='rev'?'REV':task.tag.toUpperCase();
        html+='<div class="ptask"><span class="ptag t-'+task.tag+'">'+lbl+'</span><span>'+task.t+'</span></div>';
      }
      html+='</div>';
    }
    html+='</div>';
  }
  html+='<div class="phase-lbl">Phase 2 — Revision & Mocks (Apr 23 → May 30)</div>';
  var P2=[
    {num:'Week 6',dates:'Apr 23–29',focus:'CA Methods PYQs · Law: EPF + ESI + Code on Wages'},
    {num:'Week 7',dates:'Apr 30–May 6',focus:'CA Techniques PYQs · Law: Business Ethics + EI'},
    {num:'Week 8 — MOCK 1',dates:'May 7–13',focus:'🎯 Full mock attempt all 4 papers — make gap list after'},
    {num:'Week 9',dates:'May 14–20',focus:'Weak area attack — based entirely on Mock 1 gap list'},
    {num:'Week 10',dates:'May 21–27',focus:'High weightage push — Partnership, AS, Standard Costing, GST ITC'},
    {num:'Week 11 — MOCK 2',dates:'May 28–30',focus:'🎯 Mock 2 + consolidation only · ✅ Phase 2 Done May 30'}
  ];
  for(var p=0;p<P2.length;p++){
    html+='<div class="wk-card"><div class="wk-head"><div class="wk-num">'+P2[p].num+'</div><div class="wk-dates">'+P2[p].dates+'</div><div class="wk-focus">'+P2[p].focus+'</div></div>'
      +'<div class="plan-day"><div class="ptask" style="color:var(--muted);">PYQs + timed practice + revision — same daily structure applies</div></div></div>';
  }
  document.getElementById('page-planner').innerHTML=html;
}

// ── Tab switch ────────────────────────────────────────────────────────────────
function goTab(id){
  var pages=document.querySelectorAll('.page');for(var i=0;i<pages.length;i++)pages[i].classList.remove('active');
  var tabs=document.querySelectorAll('.nav-tab');for(var i=0;i<tabs.length;i++)tabs[i].classList.remove('active');
  document.getElementById('page-'+id).classList.add('active');
  var tab=document.querySelector('.nav-tab[data-page="'+id+'"]');
  if(tab){tab.classList.add('active');tab.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});}
  document.querySelector('.main-scroll').scrollTop=0;
}
var tabs=document.querySelectorAll('.nav-tab');
for(var i=0;i<tabs.length;i++){(function(tab){tab.addEventListener('click',function(){goTab(tab.dataset.page);});})(tabs[i]);}

// ── INIT ──────────────────────────────────────────────────────────────────────
loadProgress();setDefaults();saveProgress();
updateDate();
updateOverall();
buildMini();
for(var i=0;i<SUBJECTS.length;i++)buildChapterPage(SUBJECTS[i]);
buildPlanner();
setInterval(updateDate,60000);
