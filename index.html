<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0c0c10">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>CMA Tracker — Deepanshu</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════ ROOT ══ */
:root {
  --bg:     #0c0c10;
  --card:   #13131a;
  --card2:  #1a1a24;
  --border: #222232;
  --text:   #e8e8f0;
  --muted:  #5a5a80;
  --ca:     #3b82f6;
  --fa:     #10b981;
  --dt:     #f59e0b;
  --idt:    #ef4444;
  --law:    #a855f7;
  --green:  #10b981;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; }
body {
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  font-size:14px;
  display:flex;
  flex-direction:column;
  height:100dvh;
  overflow:hidden;
  user-select:none;
}

/* ═══════════════════════════════════════ TOP BAR ══ */
.topbar {
  background:var(--card);
  border-bottom:1px solid var(--border);
  padding:14px 16px 12px;
  flex-shrink:0;
  position:relative;
  z-index:10;
}
.topbar-row1 {
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:10px;
}
.app-title {
  font-family:'Playfair Display',serif;
  font-size:20px;
  font-weight:900;
  background:linear-gradient(135deg,#3b82f6,#10b981 50%,#f59e0b);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
.date-chip {
  font-family:'DM Mono',monospace;
  font-size:11px;
  color:var(--muted);
  background:var(--card2);
  padding:4px 10px;
  border-radius:20px;
  border:1px solid var(--border);
}

/* COUNTDOWN STRIP */
.countdown-strip {
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:8px;
}
.cd-item {
  background:var(--card2);
  border:1px solid var(--border);
  border-radius:10px;
  padding:8px 10px;
  text-align:center;
}
.cd-num {
  font-family:'DM Mono',monospace;
  font-size:20px;
  font-weight:500;
  line-height:1.1;
}
.cd-label {
  font-size:9px;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:1px;
  margin-top:2px;
}

/* ═══════════════════════════════════════ NAV TABS ══ */
.nav-tabs {
  display:flex;
  background:var(--card);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  overflow-x:auto;
  scrollbar-width:none;
}
.nav-tabs::-webkit-scrollbar { display:none; }
.nav-tab {
  flex:1;
  min-width:0;
  padding:10px 4px;
  text-align:center;
  font-size:11px;
  font-weight:600;
  color:var(--muted);
  cursor:pointer;
  border-bottom:2px solid transparent;
  transition:all 0.2s;
  white-space:nowrap;
  position:relative;
}
.nav-tab.active {
  color:var(--text);
  border-bottom-color:var(--accent, #3b82f6);
}
.nav-tab .tab-dot {
  width:6px; height:6px;
  border-radius:50%;
  margin:0 auto 3px;
  opacity:0.4;
}
.nav-tab.active .tab-dot { opacity:1; }

/* ═══════════════════════════════════════ MAIN SCROLL ══ */
.main-scroll {
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding:14px 14px calc(14px + var(--safe-bottom));
}
.main-scroll::-webkit-scrollbar { display:none; }

/* PAGE */
.page { display:none; }
.page.active { display:block; }

/* ═══════════════════════════════════════ DASHBOARD ══ */
.overall-card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:16px;
  margin-bottom:12px;
}
.oc-top {
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:12px;
}
.oc-title {
  font-size:11px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:2px;
  color:var(--muted);
}
.oc-pct {
  font-family:'DM Mono',monospace;
  font-size:28px;
  font-weight:500;
}
.bar-track {
  height:8px;
  background:var(--border);
  border-radius:99px;
  overflow:hidden;
  margin-bottom:6px;
}
.bar-fill {
  height:100%;
  border-radius:99px;
  transition:width 0.5s cubic-bezier(.4,0,.2,1);
}
.overall-bar-fill {
  background:linear-gradient(90deg,#3b82f6,#10b981 50%,#f59e0b);
}
.oc-count {
  font-family:'DM Mono',monospace;
  font-size:11px;
  color:var(--muted);
}

/* SUBJECT MINI CARDS */
.subj-mini-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:12px;
}
.subj-mini {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:14px;
  cursor:pointer;
  transition:transform 0.1s, border-color 0.2s;
  active:scale(0.97);
}
.subj-mini:active { transform:scale(0.97); }
.sm-top {
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  margin-bottom:8px;
}
.sm-name {
  font-size:11px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.5px;
  line-height:1.3;
}
.sm-count {
  font-family:'DM Mono',monospace;
  font-size:10px;
  color:var(--muted);
}
.sm-paper {
  font-size:10px;
  color:var(--muted);
  margin-top:6px;
}

/* PLANNER CARD */
.planner-today {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:16px;
  margin-bottom:12px;
}
.pt-header {
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:12px;
}
.pt-header h3 {
  font-family:'Playfair Display',serif;
  font-size:16px;
  font-weight:700;
}
.today-badge {
  font-size:9px;
  font-weight:700;
  padding:3px 8px;
  border-radius:20px;
  background:rgba(59,130,246,0.15);
  color:#3b82f6;
  text-transform:uppercase;
  letter-spacing:1px;
}
.today-task {
  display:flex;
  align-items:flex-start;
  gap:10px;
  padding:10px 0;
  border-bottom:1px solid var(--border);
}
.today-task:last-child { border-bottom:none; }
.tt-tag {
  font-size:9px;
  font-weight:700;
  padding:2px 7px;
  border-radius:4px;
  text-transform:uppercase;
  letter-spacing:0.5px;
  flex-shrink:0;
  margin-top:2px;
}
.tt-text {
  font-size:12.5px;
  color:#c0c0d8;
  line-height:1.5;
}
.tt-time {
  font-family:'DM Mono',monospace;
  font-size:10px;
  color:var(--muted);
  margin-left:auto;
  flex-shrink:0;
  margin-top:2px;
}

/* LAW TARGET */
.law-target-card {
  background:rgba(168,85,247,0.06);
  border:1px solid rgba(168,85,247,0.2);
  border-radius:12px;
  padding:14px 16px;
  margin-bottom:12px;
}
.lt-top {
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:6px;
}
.lt-badge {
  font-size:9px;
  font-weight:700;
  padding:2px 8px;
  border-radius:4px;
  background:rgba(168,85,247,0.15);
  color:#a855f7;
  text-transform:uppercase;
  letter-spacing:1px;
}
.lt-text {
  font-size:12px;
  color:#b090d0;
  line-height:1.6;
}

/* ═══════════════════════════════════════ CHAPTERS PAGE ══ */
.chapter-subj-header {
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px 0 8px;
}
.chapter-subj-header h3 {
  font-family:'Playfair Display',serif;
  font-size:17px;
  font-weight:700;
}
.ch-paper {
  font-family:'DM Mono',monospace;
  font-size:10px;
  color:var(--muted);
  background:var(--card2);
  padding:2px 8px;
  border-radius:4px;
  border:1px solid var(--border);
}
.ch-prog-bar {
  margin-bottom:14px;
}
.ch-prog-info {
  display:flex;
  justify-content:space-between;
  font-size:11px;
  color:var(--muted);
  margin-bottom:5px;
  font-family:'DM Mono',monospace;
}

/* SECTION */
.section-divider {
  font-size:9px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:2px;
  color:var(--muted);
  padding:10px 0 5px;
}

/* CHAPTER ITEM */
.ch-item {
  display:flex;
  align-items:center;
  gap:12px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:10px;
  padding:13px 14px;
  margin-bottom:7px;
  cursor:pointer;
  transition:background 0.15s, border-color 0.2s, transform 0.1s;
}
.ch-item:active { transform:scale(0.98); }
.ch-item.done {
  background:rgba(16,185,129,0.05);
  border-color:rgba(16,185,129,0.2);
}
.ch-checkbox {
  width:22px;
  height:22px;
  border-radius:7px;
  border:2px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  transition:all 0.2s;
}
.ch-item.done .ch-checkbox {
  border-color:var(--subj-color, #10b981);
  background:var(--subj-color, #10b981);
}
.ch-checkbox svg {
  display:none;
  width:13px; height:13px;
  stroke:#fff; fill:none;
  stroke-width:2.5;
  stroke-linecap:round;
  stroke-linejoin:round;
}
.ch-item.done .ch-checkbox svg { display:block; }
.ch-label {
  flex:1;
  font-size:12.5px;
  line-height:1.45;
  color:var(--text);
  transition:color 0.2s;
}
.ch-item.done .ch-label {
  color:var(--muted);
  text-decoration:line-through;
  text-decoration-color:rgba(255,255,255,0.12);
}
.ch-weight {
  font-family:'DM Mono',monospace;
  font-size:10px;
  color:var(--muted);
  flex-shrink:0;
}
.warn-chip {
  font-size:8px;
  font-weight:700;
  padding:2px 5px;
  border-radius:3px;
  background:rgba(239,68,68,0.12);
  color:#ef4444;
  text-transform:uppercase;
  letter-spacing:0.5px;
  flex-shrink:0;
}

/* ═══════════════════════════════════════ PLANNER PAGE ══ */
.phase-label {
  font-size:9px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:2px;
  color:var(--muted);
  padding:14px 0 8px;
}
.week-card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  margin-bottom:10px;
  overflow:hidden;
}
.wk-head {
  padding:11px 14px;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:4px;
}
.wk-num {
  font-family:'DM Mono',monospace;
  font-size:10px;
  color:var(--muted);
}
.wk-dates {
  font-size:12px;
  font-weight:700;
}
.wk-focus {
  font-size:10px;
  color:var(--muted);
  width:100%;
  margin-top:2px;
}
.law-target-strip {
  background:rgba(168,85,247,0.06);
  border-bottom:1px solid rgba(168,85,247,0.15);
  padding:9px 14px;
  font-size:11px;
  color:#b090d0;
  line-height:1.5;
}
.law-target-strip strong { color:#a855f7; }
.plan-day {
  border-bottom:1px solid var(--border);
  padding:11px 14px;
}
.plan-day:last-child { border-bottom:none; }
.plan-day-header {
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:7px;
}
.plan-day-name {
  font-size:12px;
  font-weight:700;
}
.plan-day-date {
  font-family:'DM Mono',monospace;
  font-size:10px;
  color:var(--muted);
}
.plan-day-time {
  font-family:'DM Mono',monospace;
  font-size:9px;
  color:var(--muted);
  margin-left:auto;
  text-align:right;
  line-height:1.4;
}
.plan-task {
  display:flex;
  align-items:flex-start;
  gap:8px;
  font-size:11.5px;
  color:#b0b0d0;
  line-height:1.5;
  margin-bottom:5px;
}
.plan-task:last-child { margin-bottom:0; }
.ptag {
  font-size:8px;
  font-weight:700;
  padding:2px 5px;
  border-radius:3px;
  text-transform:uppercase;
  letter-spacing:0.5px;
  flex-shrink:0;
  margin-top:2px;
}
.plan-split {
  height:1px;
  background:rgba(255,255,255,0.05);
  margin:7px 0;
}
.split-sub-label {
  font-size:9px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:1.5px;
  color:var(--muted);
  margin-bottom:5px;
}

/* today highlight */
.plan-day.is-today {
  background:rgba(59,130,246,0.04);
}
.plan-day.is-today .plan-day-name {
  color:#3b82f6;
}

/* ═══════════════════════════════════════ TOAST ══ */
.toast {
  position:fixed;
  bottom:calc(72px + var(--safe-bottom));
  left:50%;
  transform:translateX(-50%) translateY(80px);
  background:var(--card2);
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px 20px;
  font-size:13px;
  color:var(--text);
  transition:transform 0.3s cubic-bezier(.4,0,.2,1);
  z-index:999;
  white-space:nowrap;
  pointer-events:none;
  box-shadow:0 8px 32px rgba(0,0,0,0.5);
}
.toast.show { transform:translateX(-50%) translateY(0); }

/* ═══════════════════════════════════════ TAGS ══ */
.t-ca  { background:rgba(59,130,246,0.15);  color:#3b82f6; }
.t-fa  { background:rgba(16,185,129,0.15);  color:#10b981; }
.t-dt  { background:rgba(245,158,11,0.15);  color:#f59e0b; }
.t-idt { background:rgba(239,68,68,0.15);   color:#ef4444; }
.t-law { background:rgba(168,85,247,0.12);  color:#a855f7; }
.t-rev { background:rgba(100,116,139,0.15); color:#94a3b8; }

/* ═══════════════════════════════════════ SCROLLBAR ══ */
* { scrollbar-width:none; }
*::-webkit-scrollbar { display:none; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-row1">
    <div class="app-title">CMA Tracker</div>
    <div class="date-chip" id="date-chip">Loading…</div>
  </div>
  <div class="countdown-strip">
    <div class="cd-item">
      <div class="cd-num" id="cd-syllabus" style="color:#10b981">--</div>
      <div class="cd-label">Syllabus<br>Apr 22</div>

      <div class="cd-num" id="cd-revision" style="color:#f59e0b">--</div>

    <div class="cd-item">
      <div class="cd-num" id="cd-exam" style="color:#ef4444">--</div>
      <div class="cd-label">Exam<br>Jun 11</div>
    </div>
  </div>
</div>

<!-- NAV TABS -->
<div class="nav-tabs" id="nav-tabs">
  <div class="nav-tab active" data-page="dashboard" style="--accent:#3b82f6">
    <div class="tab-dot" style="background:#3b82f6"></div>
    Home
  </div>
  <div class="nav-tab" data-page="ca" style="--accent:#3b82f6">
    <div class="tab-dot" style="background:#3b82f6"></div>
    Costing
  </div>
  <div class="nav-tab" data-page="fa" style="--accent:#10b981">
    <div class="tab-dot" style="background:#10b981"></div>
    FA
  </div>
  <div class="nav-tab" data-page="tax" style="--accent:#f59e0b">
    <div class="tab-dot" style="background:#f59e0b"></div>
    Tax
  </div>
  <div class="nav-tab" data-page="law" style="--accent:#a855f7">
    <div class="tab-dot" style="background:#a855f7"></div>
    Law
  </div>
  <div class="nav-tab" data-page="planner" style="--accent:#94a3b8">
    <div class="tab-dot" style="background:#94a3b8"></div>
    Planner
  </div>
</div>

<!-- MAIN SCROLL -->
<div class="main-scroll">

  <!-- ═══ DASHBOARD ═══ -->
  <div class="page active" id="page-dashboard">
    <div class="overall-card">
      <div class="oc-top">
        <div class="oc-title">Overall Progress</div>
        <div class="oc-pct" id="overall-pct">0%</div>
      </div>
      <div class="bar-track">
        <div class="bar-fill overall-bar-fill" id="overall-bar" style="width:0%"></div>
      </div>
      <div class="oc-count" id="overall-count">0 / 0 chapters done</div>
    </div>

    <div class="subj-mini-grid" id="subj-mini-grid"></div>

    <div class="planner-today" id="planner-today">
      <div class="pt-header">
        <h3>Today's Plan</h3>
        <div class="today-badge" id="today-badge">--</div>
      </div>
      <div id="today-tasks-content"></div>
    </div>

    <div class="law-target-card" id="law-target-card">
      <div class="lt-top">
        <div class="lt-badge">This Week — Law</div>
      </div>
      <div class="lt-text" id="law-target-text">Loading…</div>
    </div>
  </div>

  <!-- ═══ CA PAGE ═══ -->
  <div class="page" id="page-ca"></div>

  <!-- ═══ FA PAGE ═══ -->
  <div class="page" id="page-fa"></div>

  <!-- ═══ TAX PAGE ═══ -->
  <div class="page" id="page-tax"></div>

  <!-- ═══ LAW PAGE ═══ -->
  <div class="page" id="page-law"></div>

  <!-- ═══ PLANNER PAGE ═══ -->
  <div class="page" id="page-planner"></div>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>
